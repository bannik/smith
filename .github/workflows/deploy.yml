name: Deploy Agent

on:
  push:
    branches: [main]

concurrency:
  group: deploy-agent
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy agent workspace
        run: |
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            --exclude='logo-*.svg' \
            --exclude='logo-preview.html' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_SERVER_IP }}:/home/agent/the-audacity-timeline/

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_SERVER_IP }} << 'EOF'
            # Fix ownership
            sudo chown -R agent:agent /home/agent/the-audacity-timeline

            # Copy updated config to openclaw dir
            cp /home/agent/the-audacity-timeline/openclaw.json /home/agent/.openclaw/openclaw.json

            # Restart agent gateway + dashboard
            sudo systemctl restart audacity-agent
            sudo systemctl restart audacity-dashboard

            # Verify both started
            sleep 3
            echo "--- Agent status ---"
            sudo systemctl is-active audacity-agent || true
            echo "--- Dashboard status ---"
            sudo systemctl is-active audacity-dashboard || true
            curl -sf http://localhost:3847/ > /dev/null && echo "Dashboard: OK" || echo "Dashboard: waiting..."

            echo "Deploy complete!"
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
