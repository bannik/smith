<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
  </defs>

  <!-- Clean white background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bg2)"/>

  <!-- Big bold "A" as the icon -->
  <text x="200" y="230" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="220" font-weight="900" fill="#0D0D0D">A</text>

  <!-- Red exclamation mark overlaid -->
  <text x="280" y="155" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="900" fill="#FF3333">!</text>

  <!-- Small "the audacity timeline" curved at bottom -->
  <text x="200" y="335" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#666666" letter-spacing="2">THE AUDACITY TIMELINE</text>

  <!-- Thin red line under text -->
  <rect x="80" y="345" width="240" height="2" fill="#FF3333" rx="1"/>
</svg>