<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="redgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#B91C1C"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="200" cy="200" r="200" fill="#111111"/>

  <!-- Red "breaking news" banner stripe -->
  <rect x="0" y="130" width="400" height="80" fill="url(#redgrad)"/>

  <!-- AUDACITY on the red banner -->
  <text x="200" y="183" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" letter-spacing="5">AUDACITY</text>

  <!-- THE above banner -->
  <text x="200" y="120" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#888888" letter-spacing="10">THE</text>

  <!-- TIMELINE below banner -->
  <text x="200" y="245" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#AAAAAA" letter-spacing="12">TIMELINE</text>

  <!-- Blinking live dot -->
  <circle cx="145" cy="290" r="6" fill="#FF3333"/>
  <text x="165" y="295" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#FF3333" letter-spacing="2">LIVE</text>

  <!-- Globe icon suggestion - simple wire globe -->
  <circle cx="200" cy="330" r="20" fill="none" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="200" cy="330" rx="10" ry="20" fill="none" stroke="#333333" stroke-width="1"/>
  <line x1="180" y1="330" x2="220" y2="330" stroke="#333333" stroke-width="1"/>
</svg>